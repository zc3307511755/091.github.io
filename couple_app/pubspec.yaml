name: couple_app
description: A private realtime app for couples.
publish_to: "none"
version: 0.2.7+9

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  http: ^1.2.2
  image_picker: ^1.1.2
  provider: ^6.1.2
  package_info_plus: ^9.0.1
  supabase_flutter: ^2.8.0
  intl: ^0.19.0
  url_launcher: ^6.3.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/brand/
    - assets/stitch/
