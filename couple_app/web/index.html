<!DOCTYPE html>
<html>
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="两个人的日常小空间。">
  <meta name="theme-color" content="#F17A9C">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="我们俩">
  <link rel="apple-touch-icon" href="icons/apple-touch-icon.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>我们俩</title>
  <link rel="manifest" href="manifest.json">
  <style>
    html, body {
      margin: 0;
      min-height: 100%;
      background: #fff7fa;
    }

    #brand-bootstrap {
      position: fixed;
      inset: 0;
      z-index: 0;
      display: grid;
      place-items: center;
      background: #fff7fa;
      transition: opacity 240ms ease;
    }

    #brand-bootstrap img {
      width: 92px;
      height: 92px;
      border-radius: 22px;
      object-fit: cover;
      box-shadow: 0 12px 28px rgba(241, 122, 156, 0.12);
    }
  </style>
</head>
<body>
  <div id="brand-bootstrap" aria-hidden="true">
    <img src="icons/Icon-192.png" alt="">
  </div>
  <!--
    You can customize the "flutter_bootstrap.js" script.
    This is useful to provide a custom configuration to the Flutter loader
    or to give the user feedback during the initialization process.

    For more details:
    * https://docs.flutter.dev/platform-integration/web/initialization
  -->
  <script src="flutter_bootstrap.js" async></script>
  <script>
    const flutterViewObserver = new MutationObserver(function () {
      if (!document.querySelector('flutter-view')) return;
      const bootstrap = document.getElementById('brand-bootstrap');
      if (bootstrap) {
        bootstrap.style.opacity = '0';
        window.setTimeout(function () { bootstrap.remove(); }, 260);
      }
      flutterViewObserver.disconnect();
    });
    flutterViewObserver.observe(document.body, { childList: true, subtree: true });

    if ('serviceWorker' in navigator) {
      window.addEventListener('load', function () {
        navigator.serviceWorker.register('pwa_service_worker.js');
      });
    }
  </script>
</body>
</html>
